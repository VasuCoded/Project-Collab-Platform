<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 680" width="560" height="680" font-family="'Inter', system-ui, sans-serif" role="img" aria-label="A collaborative design board with teammate cursors, a sticky note, a brand palette, a task card and a comment">
  <defs>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#dcdbd2" stroke-width="1"/>
    </pattern>
    <radialGradient id="vig" cx="44%" cy="40%" r="72%">
      <stop offset="52%" stop-color="#2a2a1a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#2a2a1a" stop-opacity="0.07"/>
    </radialGradient>
    <filter id="card" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#26301f" flood-opacity="0.12"/>
    </filter>
    <filter id="paper" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="7" stdDeviation="8" flood-color="#453b1c" flood-opacity="0.17"/>
    </filter>
    <filter id="cur" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.6" flood-color="#1a1a12" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="560" height="680" fill="#ecebe4"/>
  <rect width="560" height="680" fill="url(#grid)"/>
  <rect width="560" height="680" fill="url(#vig)"/>

  <!-- presence -->
  <g>
    <circle cx="44" cy="44" r="10.5" fill="#1b5e3f" stroke="#ecebe4" stroke-width="2.5"/>
    <circle cx="59" cy="44" r="10.5" fill="#5f6b7a" stroke="#ecebe4" stroke-width="2.5"/>
    <circle cx="74" cy="44" r="10.5" fill="#b06a3c" stroke="#ecebe4" stroke-width="2.5"/>
    <text x="44" y="48" text-anchor="middle" font-size="9.5" font-weight="600" fill="#fff">V</text>
    <text x="59" y="48" text-anchor="middle" font-size="9.5" font-weight="600" fill="#fff">J</text>
    <text x="74" y="48" text-anchor="middle" font-size="9.5" font-weight="600" fill="#fff">A</text>
    <circle cx="100" cy="44" r="3.5" fill="#1b5e3f"/>
    <text x="112" y="48" font-size="13" fill="#82806f">3 people here</text>
  </g>

  <!-- hand-drawn arrow: sticky -> task -->
  <g fill="none">
    <path d="M150 286 C 202 320, 214 356, 254 396" stroke="#b3ad9c" stroke-width="2.6" stroke-linecap="round"/>
    <path d="M254 396 l -16 -0.8 M254 396 l -4.5 -15.2" stroke="#b3ad9c" stroke-width="2.6" stroke-linecap="round"/>
  </g>

  <!-- sticky note -->
  <g transform="translate(64 152) rotate(-5)" filter="url(#paper)">
    <rect width="152" height="120" fill="#f4edd6"/>
    <path d="M136 0 L152 0 L152 16 Z" fill="#e4d9b4"/>
    <text x="18" y="44" font-family="'Caveat','Segoe Script',cursive" font-size="28" font-weight="600" fill="#5f4f1f">warm</text>
    <text x="18" y="75" font-family="'Caveat','Segoe Script',cursive" font-size="28" font-weight="600" fill="#5f4f1f">editorial.</text>
    <text x="18" y="101" font-family="'Caveat','Segoe Script',cursive" font-size="17" fill="#9a8a55">keep the green deep</text>
  </g>

  <!-- brand palette card -->
  <g transform="translate(334 86) rotate(-2)" filter="url(#card)">
    <rect width="192" height="90" rx="14" fill="#ffffff" stroke="#e7e6de" stroke-width="1"/>
    <text x="18" y="30" font-size="12" font-weight="600" fill="#2a2b27">brand palette</text>
    <text x="176" y="30" text-anchor="end" font-size="10.5" fill="#a9a79c">5</text>
    <rect x="18" y="44" width="28" height="28" rx="8" fill="#1b5e3f"/>
    <rect x="52" y="44" width="28" height="28" rx="8" fill="#6f9e83"/>
    <rect x="86" y="44" width="28" height="28" rx="8" fill="#f4edd6" stroke="#e2ddca" stroke-width="1"/>
    <rect x="120" y="44" width="28" height="28" rx="8" fill="#b06a3c"/>
    <rect x="154" y="44" width="28" height="28" rx="8" fill="#2a2b27"/>
  </g>

  <!-- task card -->
  <g transform="translate(238 384) rotate(1.5)">
    <g filter="url(#card)">
      <rect width="228" height="104" rx="16" fill="#ffffff" stroke="#e7e6de" stroke-width="1"/>
      <rect x="18" y="18" width="94" height="21" rx="6.5" fill="#e2efe8"/>
      <text x="26" y="32.5" font-size="10" font-weight="600" letter-spacing="0.4" fill="#1b5e3f">IN PROGRESS</text>
      <text x="210" y="32.5" text-anchor="end" font-size="10.5" fill="#a9a79c">Due today</text>
      <rect x="18" y="52" width="17" height="17" rx="4.5" fill="#1b5e3f"/>
      <path d="M22.5 60.5 l3 3 l5.5 -6.5" stroke="#fff" stroke-width="2.1" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="44" y="65" font-size="14" font-weight="600" fill="#2a2b27">Design System variables</text>
      <circle cx="26" cy="87" r="7.5" fill="#1b5e3f"/>
      <text x="26" y="90.5" text-anchor="middle" font-size="8" font-weight="600" fill="#fff">V</text>
      <text x="40" y="91" font-size="11.5" fill="#82806f">Assigned to Vasu</text>
    </g>
    <!-- Vasu's live selection -->
    <rect x="-5" y="-5" width="238" height="114" rx="19" fill="none" stroke="#1b5e3f" stroke-width="1.5" opacity="0.9"/>
    <g fill="#fff" stroke="#1b5e3f" stroke-width="1.5">
      <rect x="-8.5" y="-8.5" width="7" height="7" rx="1.5"/>
      <rect x="229.5" y="-8.5" width="7" height="7" rx="1.5"/>
      <rect x="-8.5" y="105.5" width="7" height="7" rx="1.5"/>
      <rect x="229.5" y="105.5" width="7" height="7" rx="1.5"/>
    </g>
  </g>

  <!-- review comment (bottom-left) -->
  <g transform="translate(60 540) rotate(-1.5)" filter="url(#card)">
    <rect width="206" height="62" rx="14" fill="#ffffff" stroke="#e7e6de" stroke-width="1"/>
    <circle cx="27" cy="25" r="9" fill="#b06a3c"/>
    <text x="27" y="28.5" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">A</text>
    <text x="43" y="23" font-size="11.5" font-weight="600" fill="#2a2b27">Aria</text>
    <text x="76" y="23" font-size="10.5" fill="#a9a79c">now</text>
    <text x="20" y="47" font-size="12" fill="#565549">round these corners a touch?</text>
  </g>

  <!-- cursor: Julian (on the sticky) -->
  <g transform="translate(196 148)" filter="url(#cur)">
    <animateTransform attributeName="transform" type="translate" additive="sum" values="0 0; 15 -9; -5 7; 0 0" keyTimes="0;0.4;0.75;1" dur="19s" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1" repeatCount="indefinite"/>
    <path d="M0 0 L0 16.5 L4.6 12.6 L7.4 18.8 L9.7 17.8 L6.9 11.7 L12.3 11.5 Z" fill="#5f6b7a" stroke="#fff" stroke-width="1.3"/>
    <path d="M11 16 h52 a6 6 0 0 1 6 6 v8 a6 6 0 0 1 -6 6 h-58 a6 6 0 0 1 -6 -6 v-8 Z" fill="#5f6b7a"/>
    <text x="37" y="29.5" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Julian</text>
  </g>

  <!-- cursor: Vasu (on the task) -->
  <g transform="translate(452 398)" filter="url(#cur)">
    <animateTransform attributeName="transform" type="translate" additive="sum" values="0 0; -20 13; 5 -6; 0 0" keyTimes="0;0.45;0.8;1" dur="15s" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1" repeatCount="indefinite"/>
    <path d="M0 0 L0 16.5 L4.6 12.6 L7.4 18.8 L9.7 17.8 L6.9 11.7 L12.3 11.5 Z" fill="#1b5e3f" stroke="#fff" stroke-width="1.3"/>
    <path d="M11 16 h44 a6 6 0 0 1 6 6 v8 a6 6 0 0 1 -6 6 h-50 a6 6 0 0 1 -6 -6 v-8 Z" fill="#1b5e3f"/>
    <text x="33" y="29.5" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Vasu</text>
  </g>

  <!-- cursor: Aria (by her comment) -->
  <g transform="translate(250 524)" filter="url(#cur)">
    <animateTransform attributeName="transform" type="translate" additive="sum" values="0 0; -13 10; 6 -5; 0 0" keyTimes="0;0.5;0.8;1" dur="23s" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1" repeatCount="indefinite"/>
    <path d="M0 0 L0 16.5 L4.6 12.6 L7.4 18.8 L9.7 17.8 L6.9 11.7 L12.3 11.5 Z" fill="#b06a3c" stroke="#fff" stroke-width="1.3"/>
    <path d="M11 16 h40 a6 6 0 0 1 6 6 v8 a6 6 0 0 1 -6 6 h-46 a6 6 0 0 1 -6 -6 v-8 Z" fill="#b06a3c"/>
    <text x="31" y="29.5" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Aria</text>
  </g>
</svg>
