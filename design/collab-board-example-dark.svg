<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 680" width="560" height="680" font-family="'Inter', system-ui, sans-serif" role="img" aria-label="A collaborative design board (dark) with teammate cursors, a sticky note, a brand palette, a task card and a comment">
  <defs>
    <pattern id="gridd" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#272a21" stroke-width="1"/>
    </pattern>
    <radialGradient id="vigd" cx="44%" cy="40%" r="74%">
      <stop offset="50%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.30"/>
    </radialGradient>
    <filter id="cardd" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <filter id="paperd" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="curd" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect width="560" height="680" fill="#12140f"/>
  <rect width="560" height="680" fill="url(#gridd)"/>
  <rect width="560" height="680" fill="url(#vigd)"/>

  <!-- presence -->
  <g>
    <circle cx="44" cy="44" r="10.5" fill="#45996f" stroke="#12140f" stroke-width="2.5"/>
    <circle cx="59" cy="44" r="10.5" fill="#8b93a0" stroke="#12140f" stroke-width="2.5"/>
    <circle cx="74" cy="44" r="10.5" fill="#c98a5a" stroke="#12140f" stroke-width="2.5"/>
    <text x="44" y="48" text-anchor="middle" font-size="9.5" font-weight="600" fill="#0e1410">V</text>
    <text x="59" y="48" text-anchor="middle" font-size="9.5" font-weight="600" fill="#141414">J</text>
    <text x="74" y="48" text-anchor="middle" font-size="9.5" font-weight="600" fill="#1e130a">A</text>
    <circle cx="100" cy="44" r="3.5" fill="#45996f"/>
    <text x="112" y="48" font-size="13" fill="#8f9186">3 people here</text>
  </g>

  <!-- hand-drawn arrow: sticky -> task -->
  <g fill="none">
    <path d="M150 286 C 202 320, 214 356, 254 396" stroke="#4b4e42" stroke-width="2.6" stroke-linecap="round"/>
    <path d="M254 396 l -16 -0.8 M254 396 l -4.5 -15.2" stroke="#4b4e42" stroke-width="2.6" stroke-linecap="round"/>
  </g>

  <!-- sticky note (paper still pops on dark) -->
  <g transform="translate(64 152) rotate(-5)" filter="url(#paperd)">
    <rect width="152" height="120" fill="#e7ddc1"/>
    <path d="M136 0 L152 0 L152 16 Z" fill="#d3c69f"/>
    <text x="18" y="44" font-family="'Caveat','Segoe Script',cursive" font-size="28" font-weight="600" fill="#5f4f1f">warm</text>
    <text x="18" y="75" font-family="'Caveat','Segoe Script',cursive" font-size="28" font-weight="600" fill="#5f4f1f">editorial.</text>
    <text x="18" y="101" font-family="'Caveat','Segoe Script',cursive" font-size="17" fill="#93824f">keep the green deep</text>
  </g>

  <!-- brand palette card -->
  <g transform="translate(334 86) rotate(-2)" filter="url(#cardd)">
    <rect width="192" height="90" rx="14" fill="#1c1e18" stroke="#31342b" stroke-width="1"/>
    <text x="18" y="30" font-size="12" font-weight="600" fill="#e9ebe4">brand palette</text>
    <text x="176" y="30" text-anchor="end" font-size="10.5" fill="#6b6d62">5</text>
    <g stroke="#ffffff" stroke-opacity="0.09" stroke-width="1">
      <rect x="18" y="44" width="28" height="28" rx="8" fill="#45996f"/>
      <rect x="52" y="44" width="28" height="28" rx="8" fill="#6f9e83"/>
      <rect x="86" y="44" width="28" height="28" rx="8" fill="#f4edd6"/>
      <rect x="120" y="44" width="28" height="28" rx="8" fill="#b06a3c"/>
      <rect x="154" y="44" width="28" height="28" rx="8" fill="#33352e"/>
    </g>
  </g>

  <!-- task card -->
  <g transform="translate(238 384) rotate(1.5)">
    <g filter="url(#cardd)">
      <rect width="228" height="104" rx="16" fill="#1c1e18" stroke="#31342b" stroke-width="1"/>
      <rect x="18" y="18" width="94" height="21" rx="6.5" fill="#16301e"/>
      <text x="26" y="32.5" font-size="10" font-weight="600" letter-spacing="0.4" fill="#6fc79c">IN PROGRESS</text>
      <text x="210" y="32.5" text-anchor="end" font-size="10.5" fill="#6b6d62">Due today</text>
      <rect x="18" y="52" width="17" height="17" rx="4.5" fill="#45996f"/>
      <path d="M22.5 60.5 l3 3 l5.5 -6.5" stroke="#0e1410" stroke-width="2.1" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="44" y="65" font-size="14" font-weight="600" fill="#e9ebe4">Design System variables</text>
      <circle cx="26" cy="87" r="7.5" fill="#45996f"/>
      <text x="26" y="90.5" text-anchor="middle" font-size="8" font-weight="600" fill="#0e1410">V</text>
      <text x="40" y="91" font-size="11.5" fill="#8f9186">Assigned to Vasu</text>
    </g>
    <rect x="-5" y="-5" width="238" height="114" rx="19" fill="none" stroke="#45996f" stroke-width="1.5" opacity="0.95"/>
    <g fill="#12140f" stroke="#45996f" stroke-width="1.5">
      <rect x="-8.5" y="-8.5" width="7" height="7" rx="1.5"/>
      <rect x="229.5" y="-8.5" width="7" height="7" rx="1.5"/>
      <rect x="-8.5" y="105.5" width="7" height="7" rx="1.5"/>
      <rect x="229.5" y="105.5" width="7" height="7" rx="1.5"/>
    </g>
  </g>

  <!-- review comment (bottom-left) -->
  <g transform="translate(60 540) rotate(-1.5)" filter="url(#cardd)">
    <rect width="206" height="62" rx="14" fill="#1c1e18" stroke="#31342b" stroke-width="1"/>
    <circle cx="27" cy="25" r="9" fill="#c98a5a"/>
    <text x="27" y="28.5" text-anchor="middle" font-size="9" font-weight="600" fill="#1e130a">A</text>
    <text x="43" y="23" font-size="11.5" font-weight="600" fill="#e9ebe4">Aria</text>
    <text x="76" y="23" font-size="10.5" fill="#6b6d62">now</text>
    <text x="20" y="47" font-size="12" fill="#b7b9ae">round these corners a touch?</text>
  </g>

  <!-- cursor: Julian (on the sticky) -->
  <g transform="translate(196 148)" filter="url(#curd)">
    <animateTransform attributeName="transform" type="translate" additive="sum" values="0 0; 15 -9; -5 7; 0 0" keyTimes="0;0.4;0.75;1" dur="19s" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1" repeatCount="indefinite"/>
    <path d="M0 0 L0 16.5 L4.6 12.6 L7.4 18.8 L9.7 17.8 L6.9 11.7 L12.3 11.5 Z" fill="#8b93a0" stroke="#12140f" stroke-width="1.3"/>
    <path d="M11 16 h52 a6 6 0 0 1 6 6 v8 a6 6 0 0 1 -6 6 h-58 a6 6 0 0 1 -6 -6 v-8 Z" fill="#8b93a0"/>
    <text x="37" y="29.5" text-anchor="middle" font-size="11" font-weight="600" fill="#141414">Julian</text>
  </g>

  <!-- cursor: Vasu (on the task) -->
  <g transform="translate(452 398)" filter="url(#curd)">
    <animateTransform attributeName="transform" type="translate" additive="sum" values="0 0; -20 13; 5 -6; 0 0" keyTimes="0;0.45;0.8;1" dur="15s" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1" repeatCount="indefinite"/>
    <path d="M0 0 L0 16.5 L4.6 12.6 L7.4 18.8 L9.7 17.8 L6.9 11.7 L12.3 11.5 Z" fill="#45996f" stroke="#12140f" stroke-width="1.3"/>
    <path d="M11 16 h44 a6 6 0 0 1 6 6 v8 a6 6 0 0 1 -6 6 h-50 a6 6 0 0 1 -6 -6 v-8 Z" fill="#45996f"/>
    <text x="33" y="29.5" text-anchor="middle" font-size="11" font-weight="600" fill="#0e1410">Vasu</text>
  </g>

  <!-- cursor: Aria (by her comment) -->
  <g transform="translate(250 524)" filter="url(#curd)">
    <animateTransform attributeName="transform" type="translate" additive="sum" values="0 0; -13 10; 6 -5; 0 0" keyTimes="0;0.5;0.8;1" dur="23s" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1" repeatCount="indefinite"/>
    <path d="M0 0 L0 16.5 L4.6 12.6 L7.4 18.8 L9.7 17.8 L6.9 11.7 L12.3 11.5 Z" fill="#c98a5a" stroke="#12140f" stroke-width="1.3"/>
    <path d="M11 16 h40 a6 6 0 0 1 6 6 v8 a6 6 0 0 1 -6 6 h-46 a6 6 0 0 1 -6 -6 v-8 Z" fill="#c98a5a"/>
    <text x="31" y="29.5" text-anchor="middle" font-size="11" font-weight="600" fill="#1e130a">Aria</text>
  </g>
</svg>
